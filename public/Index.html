<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App - Cross-Platform</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #e0f2fe, #bae6fd);
            display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;
            overflow: hidden;
        }
        .app-container {
            background: white; padding: 30px; border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 320px;
            position: relative; z-index: 10;
        }
        h1 { color: #0284c7; margin-bottom: 25px; }
        input, textarea {
            width: 100%; padding: 12px; margin: 10px 0;
            border: 2px solid #e0f2fe; border-radius: 8px; box-sizing: border-box; font-size: 16px;
            font-family: inherit;
        }
        input:focus, textarea:focus { border-color: #0284c7; outline: none; }
        textarea { resize: none; height: 80px; }
        button {
            width: 100%; background-color: #0284c7; color: white; border: none;
            padding: 12px; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold;
        }
        button:hover { background-color: #0369a1; }
        .hidden { display: none; }
        hr { border: 0; height: 1px; background: #e0f2fe; margin: 20px 0; }
        
        /* FALLBACK IN-APP NOTIFICATION CONTAINER */
        #in-app-toast {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: #0284c7; color: white; padding: 15px 25px; border-radius: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2); font-weight: bold; display: flex;
            align-items: center; gap: 10px; transition: top 0.5s ease-in-out; z-index: 99999;
            width: max-content; max-width: 90vw;
        }
        #in-app-toast.show { top: 20px; }
        .badge-status { font-size: 11px; margin-top: 5px; color: #64748b; }
    </style>
</head>
<body>

    <div id="in-app-toast">
        <span id="toast-icon">🔔</span> <span id="toast-message">You have a new message!</span>
    </div>

    <div class="app-container">
        <h1>Miss App </h1>
        
        <div id="login-section">
            <input type="text" id="username" placeholder="Enter your name...">
            <button id="btn-login">Join App</button>
            <div id="browser-status-label" class="badge-status">Checking compatibility...</div>
        </div>

        <div id="main-section" class="hidden">
            <p>Logged in as: <strong id="current-user"></strong></p>
            <h2>Made by Denis/Dev1994eke in github</h2>
            <div id="connection-mode" style="font-size:12px; color:#0369a1; font-weight:bold;"></div>
            <hr>
            <h3>Send a thought:</h3>
            <input type="text" id="target-user" placeholder="Who do you want to message?">
            <textarea id="custom-message" placeholder="Type your message..."></textarea>
            <button id="btn-send">Send Thought 🚀</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getMessaging, getToken, onMessage, isSupported } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-messaging.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBYzm3FmCClZ4LBKHVknfK3qLxwyjIfzAA",
            authDomain: "missapp-c099e.firebaseapp.com",
            projectId: "missapp-c099e",
            storageBucket: "missapp-c099e.firebasestorage.app",
            messagingSenderId: "736804728072",
            appId: "1:736804728072:web:f9dbab5560df3ab33590bd",
            measurementId: "G-CFYP2LKMW9"
        };

        const FIREBASE_VAPID_KEY = "BDNDXVUdDqeS20icXJewArG9m5wzTp6Pmrf9FXWjYekQJvs984pHx6DuXAYJTZI9mU0Q7oPD68ZpKIdDSTuZGoE";

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let messaging = null; 

        const loginSection = document.getElementById('login-section');
        const mainSection = document.getElementById('main-section');
        const usernameInput = document.getElementById('username');
        const targetInput = document.getElementById('target-user');
        const messageInput = document.getElementById('custom-message');
        const currentUserLabel = document.getElementById('current-user');
        const statusLabel = document.getElementById('browser-status-label');
        const modeLabel = document.getElementById('connection-mode');

        let currentUsername = '';
        let isUsingFallbackMode = false;

        const userLanguage = (navigator.language || navigator.userLanguage).split('-')[0];

        function showInAppNotification(title, body) {
            const toast = document.getElementById('in-app-toast');
            document.getElementById('toast-message').innerText = `${title}: ${body}`;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 5000);
        }

        async function initFCM(username) {
            try {
                const pushSupported = await isSupported() && ('Notification' in window);
                
                if (!pushSupported || Notification.permission === 'denied') {
                    isUsingFallbackMode = true;
                    setupFallbackInAppChannel(username);
                    return;
                }

                if (!messaging) messaging = getMessaging(app);
                const permission = await Notification.requestPermission();
                
                if (permission !== 'granted') {
                    isUsingFallbackMode = true;
                    setupFallbackInAppChannel(username);
                    return;
                }

                let registration;
                try {
                    const rootPath = window.location.origin + window.location.pathname.split('/public/')[0];
                    registration = await navigator.serviceWorker.register(`${rootPath}/firebase-messaging-sw.js`, { scope: '/' });
                } catch (e) {
                    registration = await navigator.serviceWorker.ready;
                }
                
                const currentToken = await getToken(messaging, { vapidKey: FIREBASE_VAPID_KEY, serviceWorkerRegistration: registration });
                
                if (currentToken) {
                    await setDoc(doc(db, "users", username.toLowerCase()), {
                        username: username,
                        token: currentToken,
                        mode: 'native-push',
                        lang: userLanguage,
                        lastSeen: new Date().toISOString()
                    });
                    
                    enterMainUI(username, "⚡ Native System Push Active");

                    onMessage(messaging, (payload) => {
                        showInAppNotification(payload.notification.title, payload.notification.body);
                    });
                }
            } catch (err) {
                console.error(err);
                setupFallbackInAppChannel(username);
            }
        }

        function setupFallbackInAppChannel(username) {
            isUsingFallbackMode = true;
            
            setDoc(doc(db, "users", username.toLowerCase()), {
                username: username,
                token: 'polling-active',
                mode: 'in-app-sync',
                lang: userLanguage,
                lastIncomingMessage: null,
                lastSeen: new Date().toISOString()
            });

            enterMainUI(username, "🌐 App Live-Sync Active (No Setup Needed)");

            onSnapshot(doc(db, "users", username.toLowerCase()), (snapshot) => {
                const data = snapshot.data();
                if (data && data.lastIncomingMessage) {
                    const msg = data.lastIncomingMessage;
                    showInAppNotification(msg.title, msg.body);
                    
                    updateDoc(doc(db, "users", username.toLowerCase()), {
                        lastIncomingMessage: null
                    });
                }
            });
        }

        function enterMainUI(username, modeText) {
            localStorage.setItem('miss_app_username', username);
            currentUsername = username;
            currentUserLabel.innerText = username;
            modeLabel.innerText = modeText;
            loginSection.classList.add('hidden');
            mainSection.classList.remove('hidden');
        }

        // Send Logic without Translation
        document.getElementById('btn-send').addEventListener('click', async () => {
            const target = targetInput.value.trim();
            const customText = messageInput.value.trim();
            
            if (!target) return alert('Enter a name');

            try {
                const userDoc = await getDoc(doc(db, "users", target.toLowerCase()));
                if (userDoc.exists()) {
                    let alertTitle = `📩 Message from ${currentUsername}`;
                    let alertBody = customText || `${currentUsername} is thinking about you right now!`;
                    
                    await updateDoc(doc(db, "users", target.toLowerCase()), {
                        lastIncomingMessage: {
                            title: alertTitle,
                            body: alertBody,
                            sender: currentUsername
                        }
                    });

                    alert(`Sent to ${target}!`);
                    messageInput.value = ''; 
                } else {
                    alert('User not found in database.');
                }
            } catch (error) {
                console.error(error);
                alert('Delivery failed.');
            }
        });

        document.getElementById('btn-login').addEventListener('click', () => {
            const user = usernameInput.value.trim();
            if (user) initFCM(user);
        });

        window.addEventListener('load', async () => {
            const pushSupported = await isSupported() && ('Notification' in window);
            statusLabel.innerText = pushSupported ? "✓ System Push Ready" : "⚠️ Device restriction detected. Live-Sync Fallback enabled.";
            
            let savedName = localStorage.getItem('miss_app_username');
            if (savedName) initFCM(savedName);
        });
    </script>
</body>
</html>
