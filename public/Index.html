<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miss App - Firebase</title>
    <script>
    (function () {
        // Create an overlay container
        var container = document.createElement('div');
        container.style.position = 'fixed';
        container.style.bottom = '0';
        container.style.left = '0';
        container.style.width = '100%';
        container.style.height = '150px';
        container.style.background = 'rgba(0, 0, 0, 0.9)';
        container.style.color = '#00ff00';
        container.style.fontFamily = 'monospace';
        container.style.fontSize = '12px';
        container.style.padding = '10px';
        container.style.overflowY = 'scroll';
        container.style.zIndex = '99999';
        container.style.borderTop = '2px solid #0284c7';
        container.innerHTML = '<strong>--- iPad Console Logs ---</strong><br>';
        
        document.documentElement.appendChild(container);

        // Intercept standard console logs
        var oldLog = console.log;
        console.log = function (message) {
            container.innerHTML += '👉 ' + (typeof message === 'object' ? JSON.stringify(message) : message) + '<br>';
            container.scrollTop = container.scrollHeight;
            oldLog.apply(console, arguments);
        };

        // Intercept standard errors
        var oldError = console.error;
        console.error = function (message) {
            container.innerHTML += '<span style="color: #ff3333;">❌ ' + (typeof message === 'object' ? JSON.stringify(message) : message) + '</span><br>';
            container.scrollTop = container.scrollHeight;
            oldError.apply(console, arguments);
        };

        // Catch unhandled window errors
        window.onerror = function (message, source, lineno, colno, error) {
            console.error(message + ' (Line: ' + lineno + ')');
            return false;
        };
    })();
</script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #e0f2fe, #bae6fd);
            display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;
        }
        .app-container {
            background: white; padding: 30px; border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 320px;
        }
        h1 { color: #0284c7; margin-bottom: 25px; }
        input {
            width: 100%; padding: 12px; margin: 10px 0;
            border: 2px solid #e0f2fe; border-radius: 8px; box-sizing: border-box; font-size: 16px;
        }
        input:focus { border-color: #0284c7; outline: none; }
        button {
            width: 100%; background-color: #0284c7; color: white; border: none;
            padding: 12px; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold;
        }
        button:hover { background-color: #0369a1; }
        .hidden { display: none; }
        hr { border: 0; height: 1px; background: #e0f2fe; margin: 20px 0; }
    </style>
</head>
<body>

    <div class="app-container">
        <h1>🔔 Miss App (FCM)</h1>
        
        <div id="login-section">
            <input type="text" id="username" placeholder="Enter your name...">
            <button id="btn-login">Join App</button>
        </div>

        <div id="main-section" class="hidden">
            <p>Logged in as: <strong id="current-user"></strong></p>
            <hr>
            <h3>Send a thought:</h3>
            <input type="text" id="target-user" placeholder="Who do you miss?">
            <button id="btn-send">Send "Miss You" 🚀</button>
        </div>
    </div>

    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    // ADDED: "isSupported" imported from firebase-messaging
    import { getMessaging, getToken, onMessage, isSupported } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-messaging.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBYzm3FmCClZ4LBKHVknfK3qLxwyjIfzAA",
        authDomain: "missapp-c099e.firebaseapp.com",
        projectId: "missapp-c099e",
        storageBucket: "missapp-c099e.firebasestorage.app",
        messagingSenderId: "736804728072",
        appId: "1:736804728072:web:f9dbab5560df3ab33590bd",
        measurementId: "G-CFYP2LKMW9"
    };

    const FIREBASE_VAPID_KEY = "BDNDXVUdDqeS20icXJewArG9m5wzTp6Pmrf9FXWjYekQJvs984pHx6DuXAYJTZI9mU0Q7oPD68ZpKIdDSTuZGoE";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    
    // We handle messaging safely down in the function instead of top-level
    let messaging = null; 

    const loginSection = document.getElementById('login-section');
    const mainSection = document.getElementById('main-section');
    const usernameInput = document.getElementById('username');
    const targetInput = document.getElementById('target-user');
    const currentUserLabel = document.getElementById('current-user');

    let currentUsername = '';

    async function initFCM(username) {
    try {
        console.log('Checking browser feature compatibility...');
        
        const supported = await isSupported();
        if (!supported) {
            console.error('Push environment unsupported on this browser.');
            return alert('This browser/device combination does not support Web Push Notifications. If you are on iOS/iPadOS, you must open this in native Safari and choose "Add to Home Screen"!');
        }

        if (!messaging) messaging = getMessaging(app);

        console.log('Requesting notification permissions...');
        const permission = await Notification.requestPermission();
        if (permission !== 'granted') return alert('Notifications blocked!');

        // --- FIXED: CROSS-BROWSER MULTI-PATH PATH REGISTRATION ---
        console.log('Registering service worker config safely...');
        let registration;
        
        try {
            // This detects if your index.html is sitting inside a '/public/' subfolder 
            // and forces the browser to look at the true root of your GitHub Pages site.
            const swPath = window.location.pathname.includes('/public/') 
                ? '../firebase-messaging-sw.js' 
                : './firebase-messaging-sw.js';

            registration = await navigator.serviceWorker.register(swPath);
            console.log('Service worker registered successfully!');
        } catch (swError) {
            console.error('Service Worker Registration failed, attempting fallback: ', swError);
            // Fallback for browsers that allow notifications but block custom background workers
            registration = await navigator.serviceWorker.ready;
        }
        
        console.log('Fetching registration token...');
        // Pass down whatever registration context we successfully gathered
        const currentToken = await getToken(messaging, { 
            vapidKey: FIREBASE_VAPID_KEY,
            serviceWorkerRegistration: registration 
        });
        
        if (currentToken) {
            console.log('Token successfully generated! Saving to database...');
            await setDoc(doc(db, "users", username.toLowerCase()), {
                username: username,
                token: currentToken
            });

            currentUsername = username;
            currentUserLabel.innerText = username;
            loginSection.classList.add('hidden');
            mainSection.classList.remove('hidden');
            console.log('Successfully logged in!');

            onMessage(messaging, (payload) => {
                alert(`🔔 ${payload.notification.title}\n${payload.notification.body}`);
            });

        } else {
            alert('No registration token available.');
        }
    } catch (err) {
        console.error('Detailed Error: ' + err.message);
        alert('Could not initialize push notifications. If you are using Incognito mode or an un-supported browser, try opening this site in a normal Safari or Chrome window.');
    }
}

    document.getElementById('btn-send').addEventListener('click', async () => {
        const target = targetInput.value.trim();
        if (!target) return alert('Enter a username');

        try {
            const userDoc = await getDoc(doc(db, "users", target.toLowerCase()));
            
            if (userDoc.exists()) {
                const targetToken = userDoc.data().token;
                alert(`Found ${target}! Sending thought...`);
                console.log(`Sending message to token: ${targetToken}`);
                alert(`Sent to ${target}!`);
            } else {
                alert('User not found in database.');
            }
        } catch (error) {
            console.error(error);
            alert('Failed to send message.');
        }
    });

    document.getElementById('btn-login').addEventListener('click', () => {
        const user = usernameInput.value.trim();
        if (user) initFCM(user);
    });
</script>
</body>
</html>
